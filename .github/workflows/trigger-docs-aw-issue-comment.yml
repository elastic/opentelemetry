name: Docs Agentic Workflow — Issue Comment

# Distributed to repositories in config/docs/active-repositories.json.

on:
  issue_comment:
    types: [edited]

permissions:
  contents: read
  issues: read

jobs:
  run-docs-aw-issue-comment:
    permissions:
      actions: read
      checks: read
      contents: read
      copilot-requests: write
      discussions: write
      id-token: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/docs-aw-event-issue-comment.yml@main # ratchet:exclude
