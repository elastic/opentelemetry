name: Docs Agentic Workflow — AI Issue Menu

# Distributed to repositories in config/docs/active-repositories.json.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number for Docs AI issue menu (manual refresh).
        required: true
        type: string

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: read
      discussions: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/docs-aw-ai-menu.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
